spring:
  application:
    name: QuizEdu

datasource:
  url: jdbc:mysql://localhost:3306/quizedu
  username: root
  password: ""

jwt:
  secret: mySecretKey1234567890123456789012345678901234567890
  expiration: 86400000

gemini:
