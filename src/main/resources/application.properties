spring.application.name=edutech

spring.profiles.active=local

server.port=8081

spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/edutech_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://openrouter.ai/api/v1/chat/completions
gemini.model=google/gemini-2.5-flash-lite

# Firebase Admin SDK
firebase.credentials.path=firebase-service-account.json
